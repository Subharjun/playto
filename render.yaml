databases:
  # Managed PostgreSQL Database
  - name: playto-payout-db
    plan: free
    region: ohio # Change if necessary

services:
  # Managed Redis
  - type: redis
    name: playto-payout-redis
    plan: free
    region: ohio # Change if necessary
    ipAllowList: [] # Required by Render, empty list means only internal Render resources can connect

  # Backend Web Service (Django + Celery using Honcho)
  - type: web
    name: playto-payout-backend
    env: python
    region: ohio # Change if necessary
    plan: free
    buildCommand: "./backend/build.sh"
    startCommand: "cd backend && honcho start"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: playto-payout-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: playto-payout-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: playto-payout-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "*" # Or set to your render URL once known

  # Frontend Static Site (React/Vite)
  - type: web
    name: playto-payout-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: playto-payout-backend
          property: host
